  <!-- Right side text. Helvetica is universally available on macOS / iOS / browsers. -->
  <g font-family="Helvetica, Arial, sans-serif" fill="#ffffff">
    <text x="580" y="245" font-size="118" font-weight="bold" letter-spacing="-3">FreeTube</text>
    <text x="580" y="318" font-size="32" fill="#a8a8b0">Native YouTube client</text>
    <text x="580" y="362" font-size="32" fill="#a8a8b0">for iPhone &amp; iPad</text>

    <!-- Pill: Open Source -->
    <rect x="580" y="410" width="220" height="48" rx="24" fill="none" stroke="#ff6b62" stroke-width="2.5"/>
    <text x="690" y="442" font-size="20" font-weight="bold" fill="#ff8a3d" text-anchor="middle">Open Source · MIT</text>

