<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Use objectBoundingBox (default) so ImageMagick renders the gradient correctly
         regardless of any parent transform on the filled element. -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#1a1a1f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.27" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff453a" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#ff453a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff453a"/>
      <stop offset="1" stop-color="#ff8a3d"/>
    </linearGradient>
  </defs>

  <!-- Page background + soft red glow behind the icon -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- App icon: 360x360 rounded square positioned at (140, 135) -->
  <rect x="140" y="135" width="360" height="360" rx="80" fill="url(#iconBg)"/>
  <!-- Inner glyph: original 24x24 path scaled by 10 (= 0.667 * 15), shifted to (200, 195). -->
